<?xml version='1.0' encoding='UTF-8' standalone='no'?><svg contentScriptType='application/ecmascript' contentStyleType='text/css' height='661px' preserveAspectRatio='none' style='width:980px;height:661px;background:#FFFFFF;' version='1.1' viewBox='0 0 980 661' width='980px' xmlns:xlink='http://www.w3.org/1999/xlink' xmlns='http://www.w3.org/2000/svg' zoomAndPan='magnify'><defs/><g><text fill='#000000' font-family='sans-serif' font-size='18' lengthAdjust='spacing' textLength='403' x='282' y='18.6855'>STIX Enrichment Agent — System Context (C4 L1)</text><text fill='#000000' font-family='sans-serif' font-size='13' font-style='italic' lengthAdjust='spacing' textLength='354' x='306.5' y='36.1357'>AIS 3.0 Submission Enrichment Capability — Boundary View</text><rect fill='#08427B' height='178.6875' style='stroke:#073B6F;stroke-width:1.5;' width='196' x='134' y='351.9922'/><image height='48' xlink:href='data:image/png;base64,' width='48' x='208' y='361.9922'/><text fill='#FFFFFF' font-family='sans-serif' font-size='16' font-weight='bold' lengthAdjust='spacing' textLength='127' x='166.5' y='426.6016'>Threat Analysts /</text><text fill='#FFFFFF' font-family='sans-serif' font-size='16' font-weight='bold' lengthAdjust='spacing' textLength='76' x='194' y='446.7266'>Operators</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='0' x='234' y='464.7754'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='162' x='151' y='482.3848'>Review enriched bundles;</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='172' x='144' y='499.9941'>inspect agent traces during</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='160' x='152' y='517.6035'>demos and audit reviews.</text><rect fill='#1168BD' height='198.6094' style='stroke:#3C7FC0;stroke-width:1.5;' width='220' x='360' y='45.9922'/><text fill='#FFFFFF' font-family='sans-serif' font-size='16' font-weight='bold' lengthAdjust='spacing' textLength='177' x='381.5' y='72.6016'>STIX Enrichment Agent</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='0' x='472' y='90.6504'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='178' x='381' y='108.2598'>Agentic AI service. Receives</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='196' x='370' y='125.8691'>thin STIX 2.1 bundles, enriches</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='164' x='386' y='143.4785'>them with MITRE ATT&amp;CK</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='151' x='392.5' y='161.0879'>techniques, threat-actor</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='166' x='385' y='178.6973'>attribution, and supporting</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='152' x='392' y='196.3066'>relationships, and writes</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='130' x='403' y='213.916'>enriched bundles for</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='170' x='385' y='231.5254'>downstream dissemination.</text><rect fill='#999999' height='110.5625' style='stroke:#8A8A8A;stroke-width:1.5;' width='208' x='7' y='89.9922'/><text fill='#FFFFFF' font-family='sans-serif' font-size='16' font-weight='bold' lengthAdjust='spacing' textLength='98' x='62' y='116.6016'>stix-feed-raw</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='0' x='113' y='134.6504'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='180' x='21' y='152.2598'>Upstream Java microservice.</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='179' x='19.5' y='169.8691'>Ingests raw threat feeds and</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='175' x='23.5' y='187.4785'>emits thin STIX 2.1 bundles.</text><rect fill='#999999' height='163.3906' style='stroke:#8A8A8A;stroke-width:1.5;' width='209' x='365.5' y='359.9922'/><text fill='#FFFFFF' font-family='sans-serif' font-size='16' font-weight='bold' lengthAdjust='spacing' textLength='150' x='395' y='386.6016'>Ollama LLM Service</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='0' x='472' y='404.6504'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='175' x='382.5' y='422.2598'>Local LLM inference (Llama</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='168' x='384' y='439.8691'>3.x) with native tool calling.</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='185' x='375.5' y='457.4785'>Self-hosted — no commercial</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='160' x='388' y='475.0879'>AI API egress. Mirrors the</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='141' x='397.5' y='492.6973'>classified-environment</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='123' x='408.5' y='510.3066'>self-hosted pattern.</text><rect fill='#999999' height='163.3906' style='stroke:#8A8A8A;stroke-width:1.5;' width='217' x='609.5' y='359.9922'/><text fill='#FFFFFF' font-family='sans-serif' font-size='16' font-weight='bold' lengthAdjust='spacing' textLength='157' x='639.5' y='386.6016'>Threat Intel Catalogs</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='0' x='720' y='404.6504'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='178' x='629' y='422.2598'>MITRE ATT&amp;CK techniques,</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='128' x='652' y='439.8691'>threat-actor catalog,</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='193' x='619.5' y='457.4785'>related-intel records. Currently</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='163' x='634.5' y='475.0879'>mocked JSON; production</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='181' x='625.5' y='492.6973'>seam for real catalogs (TAXII</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='190' x='623' y='510.3066'>subscriptions, internal stores).</text><rect fill='#999999' height='110.5625' style='stroke:#8A8A8A;stroke-width:1.5;' width='210' x='764' y='89.9922'/><text fill='#FFFFFF' font-family='sans-serif' font-size='16' font-weight='bold' lengthAdjust='spacing' textLength='190' x='774' y='116.6016'>Downstream Consumers</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='0' x='871' y='134.6504'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='172' x='783' y='152.2598'>Dissemination services and</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='170' x='782' y='169.8691'>TAXII subscribers receiving</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='113' x='812.5' y='187.4785'>enriched bundles.</text><path d='M215.32,145.4922 C258,145.4922 307.6,145.4922 351.63,145.4922 ' fill='none' id='stix_feed_raw-to-enrichment_agent' style='stroke:#666666;stroke-width:1.0;'/><polygon fill='#666666' points='359.79,145.4922,351.79,142.4922,351.79,148.4922,359.79,145.4922' style='stroke:#666666;stroke-width:1.0;'/><text fill='#666666' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='108' x='233.5' y='123.9492'>Sends thin bundles</text><text fill='#666666' font-family='sans-serif' font-size='12' font-style='italic' lengthAdjust='spacing' textLength='99' x='238' y='139.043'>[filesystem queue]</text><path d='M580.08,145.4922 C634.72,145.4922 700.63,145.4922 755.7,145.4922 ' fill='none' id='enrichment_agent-to-downstream' style='stroke:#666666;stroke-width:1.0;'/><polygon fill='#666666' points='763.74,145.4922,755.74,142.4922,755.74,148.4922,763.74,145.4922' style='stroke:#666666;stroke-width:1.0;'/><text fill='#666666' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='147' x='598.5' y='123.9492'>Delivers enriched bundles</text><text fill='#666666' font-family='sans-serif' font-size='12' font-style='italic' lengthAdjust='spacing' textLength='99' x='622.5' y='139.043'>[filesystem queue]</text><path d='M470,245.2122 C470,279.5022 470,317.7422 470,351.2222 ' fill='none' id='enrichment_agent-to-ollama' style='stroke:#666666;stroke-width:1.0;'/><polygon fill='#666666' points='470,359.6322,473,351.6322,467,351.6322,470,359.6322' style='stroke:#666666;stroke-width:1.0;'/><text fill='#666666' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='93' x='471' y='295.9492'>Tool-calling chat</text><text fill='#666666' font-family='sans-serif' font-size='12' font-style='italic' lengthAdjust='spacing' textLength='78' x='478.5' y='311.043'>[HTTP / REST]</text><path d='M553.27,245.2122 C582.81,280.2322 615.82,319.3622 644.49,353.3522 ' fill='none' id='enrichment_agent-to-mock_kb' style='stroke:#666666;stroke-width:1.0;'/><polygon fill='#666666' points='649.79,359.6322,646.9253,351.5828,642.3389,355.4512,649.79,359.6322' style='stroke:#666666;stroke-width:1.0;'/><text fill='#666666' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='91' x='627.5' y='295.9492'>Catalog lookups</text><text fill='#666666' font-family='sans-serif' font-size='12' font-style='italic' lengthAdjust='spacing' textLength='112' x='617' y='311.043'>[JSON / future TAXII]</text><path d='M354.11,245.5922 C344.9,255.1722 336.06,265.0422 328,274.9922 C309.09,298.3622 291.55,325.8822 276.78,351.7122 ' fill='none' id='enrichment_agent-backto-operators' style='stroke:#666666;stroke-width:1.0;'/><polygon fill='#666666' points='359.9,239.6722,352.1671,243.3056,356.4629,247.4944,359.9,239.6722' style='stroke:#666666;stroke-width:1.0;'/><text fill='#666666' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='129' x='329' y='288.4492'>Review traces, inspect</text><text fill='#666666' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='36' x='377' y='303.543'>output</text><text fill='#666666' font-family='sans-serif' font-size='12' font-style='italic' lengthAdjust='spacing' textLength='83' x='353.5' y='318.6367'>[Console / files]</text><rect fill='#FFFFFF' height='102.0469' rx='5' ry='5' style='stroke:#FFFFFF;stroke-width:1.0;' width='118' x='840' y='543.6797'/><text fill='#000000' font-family='sans-serif' font-size='14' font-weight='bold' lengthAdjust='spacing' textLength='53' x='846' y='565.2129'>Legend</text><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='0' x='903' y='565.2129'/><rect fill='#08427B' height='17.6094' style='stroke:none;stroke-width:1.0;' width='106' x='846' y='568.2891'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='44' x='850' y='582.8223'>person</text><rect fill='#1168BD' height='17.6094' style='stroke:none;stroke-width:1.0;' width='106' x='846' y='585.8984'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='44' x='850' y='600.4316'>system</text><rect fill='#686868' height='17.6094' style='stroke:none;stroke-width:1.0;' width='106' x='846' y='603.5078'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='98' x='850' y='618.041'>external person</text><rect fill='#999999' height='17.6094' style='stroke:none;stroke-width:1.0;' width='106' x='846' y='621.1172'/><text fill='#FFFFFF' font-family='sans-serif' font-size='14' lengthAdjust='spacing' textLength='98' x='850' y='635.6504'>external system</text><line style='stroke:#FFFFFF;stroke-width:1.0;' x1='846' x2='952' y1='550.6797' y2='550.6797'/><line style='stroke:#FFFFFF;stroke-width:1.0;' x1='846' x2='952' y1='568.2891' y2='568.2891'/><line style='stroke:#FFFFFF;stroke-width:1.0;' x1='846' x2='952' y1='585.8984' y2='585.8984'/><line style='stroke:#FFFFFF;stroke-width:1.0;' x1='846' x2='952' y1='603.5078' y2='603.5078'/><line style='stroke:#FFFFFF;stroke-width:1.0;' x1='846' x2='952' y1='621.1172' y2='621.1172'/><line style='stroke:#FFFFFF;stroke-width:1.0;' x1='846' x2='952' y1='638.7266' y2='638.7266'/><line style='stroke:#FFFFFF;stroke-width:1.0;' x1='846' x2='846' y1='550.6797' y2='638.7266'/><line style='stroke:#FFFFFF;stroke-width:1.0;' x1='952' x2='952' y1='550.6797' y2='638.7266'/></g></svg>